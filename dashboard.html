<!DOCTYPE html>
<html>

<head>

<title>Face Recognition Dashboard</title>

<style>

body {
    background: #111;
    color: white;
    font-family: Arial;
    text-align: center;
}

table {
    margin: auto;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border: 1px solid #444;
}

</style>

</head>

<body>

<h1>Real-Time Recognition Dashboard</h1>

<table id="logs">
<tr>
<th>Name</th>
<th>Time</th>
</tr>
</table>

<script>

async function loadLogs() {

    const res = await fetch("http://127.0.0.1:8000/logs");
    const logs = await res.json();

    const table = document.getElementById("logs");

    table.innerHTML = `
    <tr>
        <th>Name</th>
        <th>Time</th>
    </tr>
    `;

    logs.forEach(log => {

        table.innerHTML += `
        <tr>
            <td>${log.name}</td>
            <td>${log.time}</td>
        </tr>
        `;

    });

}

setInterval(loadLogs, 1000);

</script>

</body>

</html>
